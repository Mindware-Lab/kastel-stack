<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kastel Stack Kernel - Simple Diagram</title>
  <desc id="desc">Simple architecture flow for Signals, Kernel, Action Intents, Actions, Audit Trail, and Proof Checks.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .kernel { fill: #ecfeff; stroke: #0f766e; stroke-width: 2.5; rx: 14; }
      .sub { fill: #f0fdfa; stroke: #0f766e; stroke-width: 1.5; rx: 10; }
      .audit { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 12; }
      .proof { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; }
      .bank { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 2; rx: 12; }
      .h1 { font: 700 30px Arial, sans-serif; fill: #111827; }
      .h2 { font: 700 18px Arial, sans-serif; fill: #111827; }
      .p { font: 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2.2; fill: none; marker-end: url(#arrowHead); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#111827"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="h1" x="600" y="50" text-anchor="middle">Kastel Stack Kernel (Simple)</text>
  <text class="small" x="600" y="74" text-anchor="middle">Automate the routine, escalate the salient, log everything.</text>

  <!-- Signals In -->
  <rect class="panel" x="60" y="140" width="230" height="240"/>
  <text class="h2" x="175" y="175" text-anchor="middle">Signals In</text>
  <text class="p" x="85" y="210">- Website forms</text>
  <text class="p" x="85" y="235">- Inbox / calendar</text>
  <text class="p" x="85" y="260">- Stripe events</text>
  <text class="p" x="85" y="285">- Docs / repo updates</text>
  <text class="p" x="85" y="310">- Support / community</text>

  <!-- Kernel -->
  <rect class="kernel" x="330" y="110" width="540" height="320"/>
  <text class="h2" x="600" y="145" text-anchor="middle">Kernel Controller</text>

  <rect class="sub" x="360" y="170" width="240" height="70"/>
  <text class="p" x="480" y="198" text-anchor="middle">G-Loop Orchestrator</text>
  <text class="small" x="480" y="220" text-anchor="middle">Stage gates + workflow routing</text>

  <rect class="sub" x="610" y="170" width="230" height="70"/>
  <text class="p" x="725" y="198" text-anchor="middle">Logic + Inference</text>
  <text class="small" x="725" y="220" text-anchor="middle">Abduct / Diagnose / Policy</text>

  <rect class="sub" x="360" y="255" width="240" height="70"/>
  <text class="p" x="480" y="283" text-anchor="middle">Psi Governor</text>
  <text class="small" x="480" y="305" text-anchor="middle">Budgets, caps, anti-runaway</text>

  <rect class="sub" x="610" y="255" width="230" height="70"/>
  <text class="p" x="725" y="283" text-anchor="middle">Safety Gate</text>
  <text class="small" x="725" y="305" text-anchor="middle">Auto-run / Draft / Escalate</text>

  <rect class="sub" x="470" y="340" width="260" height="70"/>
  <text class="p" x="600" y="368" text-anchor="middle">Action Intents</text>
  <text class="small" x="600" y="390" text-anchor="middle">Proposed actions before execution</text>

  <!-- Actions Out -->
  <rect class="panel" x="910" y="140" width="230" height="240"/>
  <text class="h2" x="1025" y="175" text-anchor="middle">Actions Out</text>
  <text class="p" x="935" y="210">- Email / follow-up</text>
  <text class="p" x="935" y="235">- CRM / tasks update</text>
  <text class="p" x="935" y="260">- Entitlements</text>
  <text class="p" x="935" y="285">- Publishing workflows</text>
  <text class="p" x="935" y="310">- Research queue ops</text>

  <!-- Audit -->
  <rect class="audit" x="150" y="500" width="520" height="120"/>
  <text class="h2" x="410" y="540" text-anchor="middle">Audit Trail (Append-Only Events)</text>
  <text class="small" x="410" y="568" text-anchor="middle">what happened | why allowed | inputs/outputs | rollback reference</text>

  <!-- Proof -->
  <rect class="proof" x="700" y="500" width="300" height="120"/>
  <text class="h2" x="850" y="540" text-anchor="middle">Proof Checks</text>
  <text class="small" x="850" y="568" text-anchor="middle">dry-run | rollback test | delayed re-check</text>

  <!-- Banked -->
  <rect class="bank" x="1020" y="500" width="150" height="120"/>
  <text class="h2" x="1095" y="540" text-anchor="middle">Banked</text>
  <text class="small" x="1095" y="566" text-anchor="middle">Phi-Scripts</text>

  <!-- Arrows -->
  <path class="arrow" d="M290 250 L330 250"/>
  <path class="arrow" d="M870 290 L910 290"/>
  <path class="arrow" d="M600 430 L600 500"/>
  <path class="arrow" d="M1025 380 L1025 500"/>
  <path class="arrow" d="M670 560 L700 560"/>
  <path class="arrow" d="M1000 560 L1020 560"/>
  <path class="arrow dashed" d="M1095 500 L1095 440 L600 440 L600 430"/>

  <!-- Legend -->
  <text class="small" x="85" y="700">Control loop: Signals -> Kernel -> Intents/Actions -> Audit -> Proof -> Banked scripts -> Kernel</text>
</svg>
